<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../stylesheet/customstyle.css" rel="stylesheet">
    <!-- bootstrap stylesheet -->
    <script src="../script/myscript.js"></script>
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- js CDN(popper) for dropdowns, popovers,tooltips -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <title>Feedback</title>
    <style>
        .recipe {
            /* display: visible; */
            /* position:relative; */
        } 
    </style>
</head>
<body style="background-image: none;">

<div id="navbar"></div>

<script>

document.addEventListener("DOMContentLoaded", function () {
  fetch("navbar.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbar").innerHTML = data;
    });
});

</script>


    <div class="set-background" style="background-image: linear-gradient( rgba(0, 0, 0, 0.584), rgba(0, 0, 0, 0.4)),   url('../images/images-final/company-Building.jpeg')">
        <h1 class="img-caption">Feedback</h1>
    </div>

    <div class="container feedback-container mt-5 p-1 p-sm-5">
        <form>
            <legend>Feedback Form</legend>
            <div class="form-group row">
                <div class="col">
                    <label class="form-label form-text">Name</label>
                    <input class="w-100 form-control-lg border rounded-0" type="text" placeholder="Enter Your Name">
                </div>
                <div class="col">
                    <label class="form-label">Email</label>
                    <input class="w-100 form-control-lg border rounded-0" type="Email" placeholder="Enter Your Email">
                </div>
            </div>
            <div class="form-group mt-3">
                <label class="form-text fs-6">Quality Product *</label>
                <div class="p-2">
                    <input type="radio" name="quality"> <span class="pe-0 pe-sm-3">Excellent</span>
                    <input type="radio" name="quality"> <span class="pe-0 pe-sm-3"> Good </span>
                    <input type="radio" name="quality"> <span class="pe-0 pe-sm-3"> Average</span> 
                    <input type="radio" name="quality"> <span class="pe-0 pe-sm-3"> Dissatisfied </span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-text fs-6">Quality of packing material and appearance  *</label>
                <div class="p-2">
                    <input type="radio" name="material"> <span class="pe-0 pe-sm-3">Excellent</span>
                    <input type="radio" name="material"> <span class="pe-0 pe-sm-3"> Good </span>
                    <input type="radio" name="material"> <span class="pe-0 pe-sm-3"> Average</span> 
                    <input type="radio" name="material"> <span class="pe-0 pe-sm-3"> Dissatisfied </span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-text fs-6">Delivery on committed date  *</label>
                <div class="p-2">
                    <input type="radio" name="delivery"> <span class="pe-0 pe-sm-3">Excellent</span>
                    <input type="radio" name="delivery"> <span class="pe-0 pe-sm-3"> Good </span>
                    <input type="radio" name="delivery"> <span class="pe-0 pe-sm-3"> Average</span> 
                    <input type="radio" name="delivery"> <span class="pe-0 pe-sm-3"> Dissatisfied </span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-text fs-6">Price of product  *</label>
                <div class="p-2">
                    <input type="radio" name="price"> <span class="pe-0 pe-sm-3">Excellent</span>
                    <input type="radio" name="price"> <span class="pe-0 pe-sm-3"> Good </span>
                    <input type="radio" name="price"> <span class="pe-0 pe-sm-3"> Average</span> 
                    <input type="radio" name="price"> <span class="pe-0 pe-sm-3"> Dissatisfied </span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-text fs-6">Response to enquiries/complaints  *</label>
                <div class="p-2">
                    <input type="radio" name="response"> <span class="pe-0 pe-sm-3">Excellent</span>
                    <input type="radio" name="response"> <span class="pe-0 pe-sm-3"> Good </span>
                    <input type="radio" name="response"> <span class="pe-0 pe-sm-3"> Average</span> 
                    <input type="radio" name="response"> <span class="pe-0 pe-sm-3"> Dissatisfied </span>
                </div>
            </div>
            <div class="mt-3">
                <label>What are the other brands of wheat products you buy? </label>
                <div><input type="text" class="w-100 form-control-lg border rounded-0" placeholder="Message (Max 50 characters only)"></div>
            </div>
            <div class="mt-3">
                <label>Please give your suggestions for improvement from our side.</label>
                <div><input type="text" class="w-100 form-control-lg border rounded-0" placeholder="Message"></div>
            </div>
            <button class="pe-5 ps-5 pt-3 pb-3 mt-4 btn btn-success fw-bold border rounded-0" style="border-color:none;">Learn More >> </button>
        </form>
    </div>
</body>
